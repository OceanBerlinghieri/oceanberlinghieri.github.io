site_url: https://OceanBerlinghieri.github.io/oceanberlinghieri.github.io
display_url: https://OceanBerlinghieri.github.io/oceanberlinghieri.github.io

# npm install decap-server --save-dev
# npx decap-server
local_backend: true
backend:
  name: github
  repo: OceanBerlinghieri/oceanberlinghieri.github.io
  branch: main

media_folder: "assets/images/posts"
public_folder: "/assets/images/posts"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    fields:
      - { label: 'Layout', name: 'layout', widget: 'hidden', default: 'post' }
      - { label: 'Permalink', name: 'permalink', widget: 'hidden', default: '/blog/:categories/:title' }
      - { label: 'Title', name: 'title', widget: 'string' }
      - { label: "Cover", name: "cover", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: 'Publish Date', name: 'date', widget: 'datetime' }
      - { label: 'Category', name: 'categories', widget: 'select', 
          options: ['data', 'ai', 'linux', 'portfolio', 'programming'] }
      - { label: 'Tags', name: 'tags', widget: 'list' }
      - { label: 'Body', name: 'body', widget: 'markdown' }