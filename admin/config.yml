site_url: https://OceanBerlinghieri.github.io/oceanberlinghieri.github.io
display_url: https://OceanBerlinghieri.github.io/oceanberlinghieri.github.io

# npm install decap-server --save-dev
# npx decap-server
local_backend: false
backend:
  name: github
  repo: OceanBerlinghieri/oceanberlinghieri.github.io
  branch: main

media_folder: "assets/images/posts"
public_folder: "/assets/images/posts"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{slug}}"

    fields:
      - { label: "Title", name: "title", widget: "string" }

      - { label: "Date", name: "date", widget: "datetime" }

      - {
          label: "Description",
          name: "description",
          widget: "text"
        }

      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          required: false
        }

      - { label: "Cover", name: "cover", widget: "image" }


      - { label: "Body", name: "body", widget: "markdown" }